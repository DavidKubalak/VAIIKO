<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://bootswatch.com/5/sketchy/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>Login</title>
</head>

<body>

<nav class="navbar navbar-expand-lg bg-dark border-bottom border-bottom-dark sticky-top">
    <div class="container">
        <a class="navbar-logo-text" href="index.html">Ideas</a>
        <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-6 px-5 mx-auto">
        <form class="form mt-5" method="post">
            <h1 class="text-center text-dark">Login</h1>
            <div class="form-group mt-3">
                <label class="form-text-dark" for="name">Username</label>
                <input type="text" class="form-control" id="name" placeholder="Enter your username">
            </div>
            <div class="form-group mt-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter your password">
            </div>
            <div class="form-group">
                <label class="text-dark"></label><br>
                <input type="submit" name="submit" class="btn btn-dark btn-md" value="Submit">
            </div>
            <div class="text-right mt-2">
                <p class="mt-3">Do not have an account? <a href="register.html">Register here</a></p>
            </div>
        </form>
    </div>
</div>

</body>

</html>
